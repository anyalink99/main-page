<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Timer — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="timer-header">
      <a href="/" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </a>
      <div class="tournament-name">CLASSIC TOURNAMENT</div>
      <div class="level-label" id="levelLabel">Level 1</div>
    </header>

    <!-- Timer Display -->
    <main class="timer-main">
      <div class="blinds-row">
        <div class="blind-group current">
          <span class="blind-label">Current Blinds</span>
          <span class="blind-value" id="currentBlinds">100 / 100</span>
        </div>
        <div class="blind-group next">
          <span class="blind-label">Next Blinds</span>
          <span class="blind-value" id="nextBlinds">100 / 200</span>
        </div>
      </div>

      <div class="clock-container">
        <div class="clock" id="clock">20:00</div>
      </div>

      <!-- Progress ticks -->
      <div class="progress-bar" id="progressBar"></div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn" id="prevBtn" title="Previous level">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="playBtn" title="Play / Pause">
          <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" title="Next level">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </main>

    <!-- Footer info -->
    <footer class="timer-footer">
      <div class="footer-stat">
        <span class="stat-label">Level Duration</span>
        <span class="stat-value" id="levelDuration">20 min</span>
      </div>
      <div class="footer-stat">
        <span class="stat-label">Current Level</span>
        <span class="stat-value" id="currentLevel">1 / 9</span>
      </div>
      <div class="footer-stat">
        <span class="stat-label">Next Break</span>
        <span class="stat-value" id="nextBreak">After Level 3</span>
      </div>
    </footer>
  </div>

  <a href="https://t.me/niotid" target="_blank" rel="noopener" class="author-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
    @niotid
  </a>

  <script src="script.js"></script>
</body>
</html>
