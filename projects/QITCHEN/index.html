<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qitchen — Sushi Restaurant</title>
    <meta name="description" content="Where culinary craftsmanship meets modern elegance. Indulge in the finest sushi.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Page Transition Overlay -->
    <div class="page-transition" id="pageTransition"></div>

    <!-- Main Layout -->
    <div class="page-layout">
        <!-- Left Panel - Hero Image -->
        <div class="left-panel">
            <div class="left-panel-img">
                <img src="https://framerusercontent.com/images/RAU19PL6ISblT8l98fG6ggBX9g.jpg" alt="Sushi bowl with chopsticks">
            </div>
            <nav class="nav">
                <button class="nav-burger" id="navBurger" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
                <a href="index.html" class="nav-logo">QITCHEN</a>
                <div class="nav-links">
                    <a href="menu.html" class="nav-link page-link">MENU</a>
                    <a href="about.html" class="nav-link page-link">ABOUT</a>
                </div>
                <a href="reservation.html" class="nav-btn page-link">BOOK A TABLE</a>
            </nav>
            <div class="hero-title">
                <h1 class="reveal-text"><span>SUSHI</span><br><span>SENSATION</span></h1>
            </div>
            <div class="social-icons">
                <a href="#" aria-label="TripAdvisor"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></a>
                <a href="#" aria-label="Instagram"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/></svg></a>
                <a href="#" aria-label="X"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            </div>
        </div>

        <!-- Right Panel - Bento Cards -->
        <div class="right-panel">
            <a href="menu.html" class="bento-card bento-card--img page-link" data-anim="fade-up">
                <img src="https://framerusercontent.com/images/EKJJBnLQzSzsS1Sp8JrOMfZgqw.webp" alt="Sushi platter">
                <div class="bento-card-label"><span>MENU</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg></div>
            </a>
            <a href="reservation.html" class="bento-card bento-card--img page-link" data-anim="fade-up" data-delay="0.08">
                <img src="https://framerusercontent.com/images/slPotYXPFXAfEsa1a4GJhZIk.webp" alt="Restaurant atmosphere">
                <div class="bento-card-label"><span>RESERVATION</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg></div>
            </a>
            <a href="about.html" class="bento-card bento-card--img page-link" data-anim="fade-up" data-delay="0.16">
                <img src="https://framerusercontent.com/images/InB1qO4eodYHQXKOVBszhLURHE.webp" alt="Restaurant interior">
                <div class="bento-card-label"><span>OUR RESTAURANT</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg></div>
            </a>
        </div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html" class="mobile-menu-link page-link">Home</a>
        <a href="menu.html" class="mobile-menu-link page-link">Menu</a>
        <a href="about.html" class="mobile-menu-link page-link">About</a>
        <a href="reservation.html" class="mobile-menu-link page-link">Reservation</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
